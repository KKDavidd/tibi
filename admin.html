<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin felület | Tibiredőny Kft</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

<div class="admin-login" id="loginScreen">
  <form class="login-card" id="loginForm" autocomplete="on">
    <span class="l1">Tibiredőny</span>
    <span class="l2">Admin felület</span>
    <div class="form-row">
      <label for="li-email">E-mail cím</label>
      <input id="li-email" type="email" required autocomplete="username">
    </div>
    <div class="form-row">
      <label for="li-pass">Jelszó</label>
      <input id="li-pass" type="password" required autocomplete="current-password">
    </div>
    <button class="login-btn" type="submit" id="loginBtn">Bejelentkezés</button>
    <button class="login-forgot" type="button" id="forgotBtn">Elfelejtett jelszó</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-note" id="loginNote"></div>
  </form>
</div>

<div class="admin-shell" id="adminShell">
  <aside class="admin-side" id="adminSide">
    <div class="brand">
      <div class="l1">Tibiredőny</div>
      <div class="l2">Admin felület</div>
    </div>
    <nav class="admin-nav">
      <button class="nav-btn active" data-tab="dashboard">Áttekintés</button>
      <button class="nav-btn" data-tab="leads">Ajánlatkérések <span class="count-pill" id="newLeadPill" style="display:none;">0</span></button>
      <button class="nav-btn" data-tab="gallery">Galéria</button>
    </nav>
    <button class="logout-btn" id="logoutBtn">Kijelentkezés</button>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="admin-burger" id="burgerBtn">☰</button>
        <h1 id="topbarTitle">Áttekintés</h1>
      </div>
      <div class="who" id="whoBox"></div>
    </div>

    <div class="admin-content">

      <section id="tab-dashboard">
        <div class="stat-grid">
          <div class="stat-card"><div class="num" id="statTotalLeads">–</div><div class="lbl">Összes ajánlatkérés</div></div>
          <div class="stat-card"><div class="num" id="statNewLeads">–</div><div class="lbl">Elintézetlen</div></div>
          <div class="stat-card"><div class="num" id="statGallery">–</div><div class="lbl">Galéria kép</div></div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2>Legutóbbi ajánlatkérések</h2></div>
          <div class="lead-list" id="recentLeadsList"><div class="empty-state">Betöltés…</div></div>
        </div>
      </section>

      <section id="tab-leads" style="display:none;">
        <div class="panel">
          <div class="panel-head">
            <h2>Beérkezett ajánlatkérések</h2>
            <div class="filter-chips">
              <button class="active" data-status="all">Összes</button>
              <button data-status="new">Új</button>
              <button data-status="done">Elintézve</button>
            </div>
          </div>
          <div class="lead-list" id="leadsList"><div class="empty-state">Betöltés…</div></div>
        </div>
      </section>

      <section id="tab-gallery" style="display:none;">
        <div class="panel">
          <div class="panel-head">
            <h2>Galéria kezelése</h2>
            <button class="a-btn" id="addGalleryBtn">+ Új kép hozzáadása</button>
          </div>
          <div class="filter-chips" id="galleryFilterChips" style="margin-bottom:16px;">
            <button class="active" data-cat="all">Összes</button>
          </div>
          <div class="gallery-admin-grid" id="galleryGrid"><div class="empty-state">Betöltés…</div></div>
        </div>
      </section>

    </div>
  </main>
</div>

<div class="modal-overlay" id="galleryModal">
  <div class="modal-box">
    <button class="modal-close" id="galleryModalClose">&times;</button>
    <h3 id="galleryModalTitle">Új kép hozzáadása</h3>
    <form id="galleryForm">
      <input type="hidden" id="g-id">
      <div class="a-form-row">
        <label for="g-category">Kategória</label>
        <select id="g-category" required>
          <option value="redonyok">Redőnyök</option>
          <option value="mesh">Szúnyoghálók</option>
          <option value="napellenzo">Napellenzők / Külső árnyékolók</option>
          <option value="belso">Belső árnyékolók</option>
          <option value="pergola">Pergola</option>
        </select>
      </div>
      <div class="a-form-row">
        <label for="g-caption">Felirat / leírás</label>
        <input id="g-caption" type="text" required placeholder="pl. Motoros alumínium redőny">
      </div>
      <div class="a-form-row">
        <label for="g-url">Kép URL</label>
        <img class="img-preview" id="g-preview" alt="">
        <input type="url" id="g-url" placeholder="https://..." required>
      </div>
      <div class="a-form-row">
        <label for="g-order">Sorrend (kisebb szám elöl, opcionális)</label>
        <input id="g-order" type="number" step="1">
      </div>
      <div class="form-msg" id="galleryFormMsg"></div>
      <div class="modal-actions">
        <button type="button" class="a-btn danger" id="galleryDeleteBtn" style="display:none;">Kép törlése</button>
        <button type="submit" class="a-btn" id="gallerySaveBtn">Mentés</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="admin.js"></script>
</body>
</html>
